app-id: com.blitzfc.qbz
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: qbz
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri

  # Native PipeWire access
  - --filesystem=xdg-run/pipewire-0:ro

  # User music library
  - --filesystem=xdg-music

  # Tray icon
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  # Tray icon support
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: qbz
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
      env:
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        npm_config_nodedir: /usr/lib/sdk/node20
        XDG_CACHE_HOME: /run/build/qbz/flatpak-node/cache
        npm_config_cache: /run/build/qbz/flatpak-node/npm-cache
        npm_config_offline: "true"
        npm_config_audit: "false"
        npm_config_fund: "false"
        CARGO_HOME: /run/build/qbz/cargo
        CARGO_NET_OFFLINE: "true"
    build-commands:
      - install -Dm0644 cargo/config .cargo/config.toml
      - npm ci --offline --no-audit --no-fund
      - export PATH="$PWD/node_modules/.bin:$PATH" && npm run build
      # Flathub policy: no competing auto-updaters. Disable the `updater`
      # Cargo feature so tauri-plugin-updater / tauri-plugin-process are
      # not linked into the Flatpak binary.
      - export PATH="$PWD/node_modules/.bin:$PATH" && npm run tauri build -- --no-bundle -- --no-default-features
      - install -Dm755 src-tauri/target/release/qbz /app/bin/qbz
      - install -Dm644 flatpak/com.blitzfc.qbz.desktop /app/share/applications/com.blitzfc.qbz.desktop
      - install -Dm644 com.blitzfc.qbz.metainfo.xml /app/share/metainfo/com.blitzfc.qbz.metainfo.xml
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.blitzfc.qbz.png
      - install -Dm644 src-tauri/icons/256x256.png /app/share/icons/hicolor/256x256/apps/com.blitzfc.qbz.png
      - install -Dm644 src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/com.blitzfc.qbz.png
      - install -Dm644 src-tauri/icons/48x48.png /app/share/icons/hicolor/48x48/apps/com.blitzfc.qbz.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.blitzfc.qbz.png
      - install -Dm644 src-tauri/icons/512x512.png /app/share/icons/hicolor/512x512/apps/com.blitzfc.qbz.png
    sources:
      - type: git
        url: https://github.com/vicrodh/qbz.git
        tag: v1.2.8
        commit: 0b481e5332f4beca6544b6fa6b1685ab10c3b51e
        x-checker-data:
          type: git
          tag-pattern: '^v(\d+\.\d+\.\d+)$'
      - type: file
        path: cargo/config
        dest: cargo
        dest-filename: config
      - type: file
        path: com.blitzfc.qbz.metainfo.xml
      - cargo-sources.json
      - npm-sources.json
